spring.application.name=secure-twitter-monolith

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/securetwitter}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Auth0 / OAuth2 Resource Server ──────────────────────────────────────────
# Override these in application-local.properties (gitignored)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:https://elizabeth-platform.us.auth0.com/}
auth0.audience=${AUTH0_AUDIENCE:https://secure-twitter-api}

# ─── Swagger / OpenAPI ───────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
