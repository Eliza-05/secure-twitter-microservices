spring.application.name=secure-twitter-user-service
server.port=8083

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/securetwitter}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:https://YOUR-DOMAIN.auth0.com/}
auth0.audience=${AUTH0_AUDIENCE:https://your-api-identifier}
